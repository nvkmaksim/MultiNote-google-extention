<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="index.js" defer></script>
    <title>Document</title>
</head>
<body>
    <header>
        <button><img src="img/settings.png" alt=""></button>
        <h1>MultiNote</h1>
        <button id="reset-btn"><img src="img/reset.png" alt=""></button>
    </header>
    <input class="body__input" id="note-input" type="text">
    <section class="body__btn-section">
        <button id="note-btn"><img src="img/document.png" width="64px" height="64px" alt=""></button>
        <button id="tab-btn"><img src="img/link.png" width="64px" height="64px" alt=""></button>
        <button class="body__screenshot-btn" id="screenshot-btn"><img src="img/capture.png" width="64px" height="64px" alt=""></button>
        <button id="voice-btn"><img src="img/music-note.png" width="64px" height="64px" alt=""></button>
        <button id="video-btn"><img src="img/camera.png" width="64px" height="64px" alt=""></button>
    </section>
    <section class="body__notes-section">
        <ul id="notes-list">
        </ul>
    </section>
</body>
</html>
